# ================== Aider Configuration ==================

weak-model: openai/DeepSeek-V4-Flash
editor-model: openai/DeepSeek-V4-Pro
model: openai/gpt-5.5
openai-api-base: https://codingagents-resource.services.ai.azure.com/models/
openai-api-key: "YOUR_API_KEY_HERE"

# ================== Core Settings ==================

auto-commits: true
auto-lint: true
gitignore: true
no-show-model-warnings: true
dark-mode: true
architect: true

# Better context window usage for your repo
map-tokens: 2048

# Enable prompt caching (saves tokens & money)
cache-prompts: true

# ================== Automatic Context Docs ==================
# These files will be automatically loaded as read-only every session
read:
  - internal_docs/IMPORTANT.md
  - internal_docs/AGENTS.md
  - internal_docs/AGENT-WORFLOW.md
  - internal_docs/PROMPT_TEMPLATE.md
  - internal_docs/DAILY_TASKS_NOTES.md
  - internal_docs/KERNEL_DAILY_TASKS_NOTES.md
  - internal_docs/GH_MANUAL.md
  - internal_docs/ROADMAP.md
  - internal_docs/ROADMAP2.md
  - internal_docs/WatchLLM Codebase Verification.md

# ================== Optional but Recommended ==================
# vim: false

# If you have a main conventions/style guide file, prioritize it here:
# - internal_docs/IMPORTANT.md     (already included)

# You can add shell commands for linting if needed
# lint-cmds:
#   - "ruff check --fix ."
#   - "eslint . --fix"
